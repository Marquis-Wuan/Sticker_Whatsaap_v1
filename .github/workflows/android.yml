name: Build Marquis Sticker APK

on:
  push:
    branches: [ "main" ] # Pastikan nama branch sesuai (main atau master)

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4 # Update ke v4
    
    - name: set up JDK 17
      uses: actions/setup-java@v4 # Update ke v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4 # INI YANG WAJIB v4
      with:
        name: marquis-sticker-debug
        path: app/build/outputs/apk/debug/app-debug.apk
        
